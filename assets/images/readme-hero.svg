<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Flyt tracking workspace</title>
  <desc id="desc">A light research workspace showing a completed two-fly tracking record, synchronized observation, validity, and review notes.</desc>
  <rect x="1" y="1" width="1198" height="518" rx="18" fill="#FBFBFA" stroke="#E8E7E3" stroke-width="2"/>
  <path d="M48 76H1152" stroke="#E8E7E3"/>
  <g transform="translate(48 25)">
    <rect width="34" height="34" rx="7" fill="#FFFFFF" stroke="#E8E7E3"/>
    <path d="M15 16C12 11 7 12 7 16C7 21 11 23 15 20ZM19 16C22 11 27 12 27 16C27 21 23 23 19 20Z" fill="#E8F2F8" stroke="#252523" stroke-width="1.3"/>
    <circle cx="17" cy="14" r="3.4" fill="#252523"/><path d="M17 17V26" stroke="#252523" stroke-width="4" stroke-linecap="round"/>
    <text x="47" y="24" fill="#252523" font-family="Helvetica Neue,Arial,sans-serif" font-size="17" font-weight="700">Flyt</text>
  </g>
  <g fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="12">
    <text x="830" y="47">Overview</text><text x="910" y="47">New run</text><text x="986" y="47">Review</text><text x="1053" y="47">History</text>
  </g>
  <path d="M823 62H880" stroke="#252523" stroke-width="2"/>
  <g transform="translate(48 115)">
    <text y="17" fill="#74736E" font-family="SFMono-Regular,Consolas,monospace" font-size="11">fly_video.mp4  /  run 1783945709612</text>
    <text y="75" fill="#252523" font-family="Georgia,Times New Roman,serif" font-size="42" letter-spacing="-1">Two-fly courtship assay</text>
    <text y="112" fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="15">A completed tracking record with measured trajectories, review</text>
    <text y="136" fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="15">candidates, and synchronized publication outputs.</text>
    <g transform="translate(0 177)">
      <path d="M0 0H450M0 92H450" stroke="#E8E7E3"/>
      <path d="M112 0V92M225 0V92M338 0V92" stroke="#E8E7E3"/>
      <g font-family="Helvetica Neue,Arial,sans-serif">
        <text x="0" y="23" fill="#74736E" font-size="10">FRAMES</text><text x="0" y="55" fill="#252523" font-size="24" font-weight="600">3,947</text><text x="0" y="76" fill="#A3A19B" font-size="9">25 fps</text>
        <text x="130" y="23" fill="#74736E" font-size="10">VALID TRACKING</text><text x="130" y="55" fill="#252523" font-size="24" font-weight="600">50.4%</text><text x="130" y="76" fill="#A3A19B" font-size="9">1,988 frames</text>
        <text x="243" y="23" fill="#74736E" font-size="10">AVG PROXIMITY</text><text x="243" y="55" fill="#252523" font-size="24" font-weight="600">108.9 px</text><text x="243" y="76" fill="#A3A19B" font-size="9">valid frames only</text>
        <text x="356" y="23" fill="#74736E" font-size="10">BOUTS</text><text x="356" y="55" fill="#252523" font-size="24" font-weight="600">0</text><text x="356" y="76" fill="#A3A19B" font-size="9">22 notes</text>
      </g>
    </g>
    <g transform="translate(0 307)">
      <rect width="450" height="68" rx="8" fill="#E8F2F8"/>
      <text x="18" y="25" fill="#246486" font-family="Georgia,Times New Roman,serif" font-size="17">Measured tracking validity</text>
      <text x="18" y="47" fill="#496B7B" font-family="Helvetica Neue,Arial,sans-serif" font-size="11">Two separate fly observations, not an accuracy score.</text>
      <text x="371" y="43" fill="#246486" font-family="Helvetica Neue,Arial,sans-serif" font-size="25" font-weight="600">50.4%</text>
    </g>
  </g>
  <g transform="translate(550 105)">
    <rect width="602" height="369" rx="10" fill="#FFFFFF" stroke="#E8E7E3"/>
    <text x="22" y="32" fill="#252523" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600">Observation</text>
    <rect x="22" y="49" width="380" height="226" rx="7" fill="#20211F"/>
    <rect x="49" y="73" width="326" height="178" rx="4" fill="#2D302D" stroke="#555852"/>
    <path d="M78 220C120 184 139 211 174 158C207 111 241 183 275 127C301 84 332 117 353 92" fill="none" stroke="#B9D7E7" stroke-width="3" stroke-linecap="round"/>
    <path d="M75 95C123 107 126 151 176 174C229 198 278 223 354 216" fill="none" stroke="#C9D8C7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="275" cy="127" r="7" fill="#E8F2F8" stroke="#246486" stroke-width="2"/><circle cx="176" cy="174" r="7" fill="#EDF3EC" stroke="#346538" stroke-width="2"/>
    <text x="39" y="297" fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="10">Annotated video and frame measurements remain synchronized.</text>
    <g transform="translate(424 49)">
      <text y="13" fill="#252523" font-family="Georgia,Times New Roman,serif" font-size="18">Review notes</text>
      <circle cx="142" cy="7" r="14" fill="#FBF3DB"/><text x="136" y="11" fill="#886007" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="700">22</text>
      <path d="M0 34H156M0 100H156M0 166H156M0 232H156" stroke="#E8E7E3"/>
      <text x="2" y="57" fill="#246486" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="600">Contour merge</text><text x="112" y="57" fill="#74736E" font-family="Consolas,monospace" font-size="9">00:12.8</text><text x="2" y="77" fill="#A3A19B" font-family="Helvetica Neue,Arial,sans-serif" font-size="9">31 frames  /  confidence 0.18</text>
      <text x="2" y="123" fill="#252523" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="600">Identity uncertainty</text><text x="112" y="123" fill="#74736E" font-family="Consolas,monospace" font-size="9">00:38.2</text><text x="2" y="143" fill="#A3A19B" font-family="Helvetica Neue,Arial,sans-serif" font-size="9">48 frames  /  inspect identity</text>
      <text x="2" y="189" fill="#252523" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="600">Detection loss</text><text x="112" y="189" fill="#74736E" font-family="Consolas,monospace" font-size="9">01:31.4</text><text x="2" y="209" fill="#A3A19B" font-family="Helvetica Neue,Arial,sans-serif" font-size="9">36 frames  /  zero contours</text>
      <rect y="252" width="72" height="34" rx="5" fill="#FBEAEC" stroke="#ECCFD2"/><text x="20" y="274" fill="#983A3A" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="600">Reject</text>
      <rect x="82" y="252" width="74" height="34" rx="5" fill="#EDF3EC" stroke="#CADFC9"/><text x="99" y="274" fill="#346538" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="600">Confirm</text>
    </g>
    <rect x="22" y="325" width="558" height="24" rx="5" fill="#EDF3EC"/>
    <circle cx="36" cy="337" r="4" fill="#346538"/><text x="48" y="341" fill="#346538" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="600">Integrity passed</text>
    <text x="448" y="341" fill="#74736E" font-family="Consolas,monospace" font-size="9">SYNC OK</text>
  </g>
</svg>