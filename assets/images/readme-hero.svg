<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Flyt product overview</title>
  <desc id="desc">A dark scientific dashboard illustration showing two tracked fruit flies, trajectories, behavioral charts, and validated outputs.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#151B31"/><stop offset="1" stop-color="#080B14"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#B89CFF"/><stop offset="1" stop-color="#6E48FF"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7CE9FF"/><stop offset="1" stop-color="#359BFF"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#02040A" flood-opacity=".6"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="520" rx="32" fill="#070A12"/>
  <circle cx="134" cy="22" r="250" fill="#6E48FF" opacity=".14"/>
  <circle cx="1110" cy="475" r="300" fill="#29B6F6" opacity=".10"/>
  <path d="M0 425C180 365 270 470 445 401C620 333 757 421 1200 315" fill="none" stroke="#8B6DFF" stroke-opacity=".09" stroke-width="2"/>
  <g transform="translate(62 58)">
