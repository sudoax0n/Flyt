    <rect x="24" y="86" width="278" height="210" rx="18" fill="#080B13" stroke="#58637A" stroke-opacity=".26"/>
    <rect x="48" y="106" width="230" height="170" rx="18" fill="#111827" stroke="#91A0BC" stroke-opacity=".28"/>
    <path d="M78 248C100 210 128 226 148 190C169 152 198 196 224 143C240 113 258 142 269 121" fill="none" stroke="#8D70FF" stroke-width="5" stroke-linecap="round"/>
    <path d="M76 133C115 146 111 189 157 203C198 216 206 252 269 252" fill="none" stroke="#49D3FF" stroke-width="5" stroke-linecap="round"/>
    <circle cx="224" cy="143" r="10" fill="#9C7CFF" filter="url(#glow)"/>
    <circle cx="157" cy="203" r="10" fill="#55DAFF" filter="url(#glow)"/>
    <text x="62" y="126" fill="#8A95AE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">ROI / trajectory overlay</text>
    <rect x="320" y="86" width="186" height="98" rx="18" fill="#0E1322"/>
    <text x="340" y="112" fill="#8F9AB1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">INTER-FLY DISTANCE</text>
    <text x="340" y="148" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="31" font-weight="750">42.8 px</text>
    <path d="M340 166L365 155L388 160L412 136L438 142L463 119L486 125" fill="none" stroke="#55D9FF" stroke-width="3" stroke-linecap="round"/>
    <rect x="320" y="198" width="186" height="98" rx="18" fill="#0E1322"/>
    <text x="340" y="224" fill="#8F9AB1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">IDENTITY CONFIDENCE</text>
    <text x="340" y="260" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="31" font-weight="750">0.94</text>
    <rect x="340" y="274" width="142" height="7" rx="4" fill="#242B3D"/><rect x="340" y="274" width="132" height="7" rx="4" fill="url(#violet)"/>
    <rect x="24" y="316" width="482" height="70" rx="18" fill="#0E1322"/>
    <circle cx="55" cy="351" r="14" fill="#183829"/>
    <path d="M48 351L53 356L63 345" fill="none" stroke="#6EE7B7" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="345" fill="#F4F7FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Courtship bout validated</text>
    <text x="80" y="366" fill="#8F9AB1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">00:02:14–00:02:21 · ready for export</text>
    <rect x="398" y="333" width="86" height="36" rx="18" fill="#6F4BDB"/>
    <text x="421" y="356" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700">EXPORT</text>
