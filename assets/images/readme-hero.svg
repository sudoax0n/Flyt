    <path d="M36 36C24 20 10 22 9 37C8 51 21 61 36 50Z" fill="#63DFFF" fill-opacity=".62"/>
    <path d="M44 36C56 20 70 22 71 37C72 51 59 61 44 50Z" fill="#63DFFF" fill-opacity=".62"/>
    <circle cx="40" cy="31" r="8" fill="#A78BFA"/>
    <rect x="34" y="39" width="12" height="20" rx="6" fill="#8B5CF6"/>
    <path d="M40 56C31 56 32 69 40 72C48 69 49 56 40 56Z" fill="#6D45E8"/>
  </g>
  <text x="166" y="96" fill="#F6F3FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="800" letter-spacing="-2">Flyt</text>
  <text x="64" y="177" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="41" font-weight="750" letter-spacing="-1.4">From video to verified</text>
  <text x="64" y="224" fill="url(#cyan)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="41" font-weight="750" letter-spacing="-1.4">behavioral evidence.</text>
  <text x="64" y="278" fill="#AAB2C9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Deterministic, CPU-first tracking for two-fly assays.</text>
  <text x="64" y="307" fill="#AAB2C9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Local processing. Human-verified events. Reproducible exports.</text>
  <g transform="translate(64 357)">
    <rect width="150" height="44" rx="22" fill="#151A2A" stroke="#7E65FF" stroke-opacity=".45"/>
    <circle cx="23" cy="22" r="6" fill="#8D72FF"/>
    <text x="39" y="28" fill="#EAE5FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="650">OpenCV core</text>
    <rect x="164" width="160" height="44" rx="22" fill="#151A2A" stroke="#47CCFF" stroke-opacity=".38"/>
    <circle cx="187" cy="22" r="6" fill="#55D9FF"/>
    <text x="203" y="28" fill="#E8FAFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="650">Local-first</text>
    <rect x="338" width="190" height="44" rx="22" fill="#151A2A" stroke="#65E6B2" stroke-opacity=".34"/>
    <circle cx="361" cy="22" r="6" fill="#64E7B4"/>
    <text x="377" y="28" fill="#EDFFF7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="650">Human validation</text>
  </g>
