  <text x="48" y="50" fill="#252523" font-family="Georgia,Times New Roman,serif" font-size="27">From recording to research export</text>
  <text x="48" y="78" fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="14">Each stage remains visible and inspectable.</text>
  <path d="M74 116H1128" stroke="#E8E7E3" stroke-width="2"/>
