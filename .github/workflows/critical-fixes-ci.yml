name: Critical fixes CI

on:
  push:
    branches:
      - fix/critical-job-races
  pull_request:
    paths:
      - 'source app folder/dashboard/**'
      - 'source app folder/tracker/**'
      - '.github/workflows/critical-fixes-ci.yml'

permissions:
  contents: read

jobs:
  validate-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source app folder/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: source app folder/dashboard
        run: npm ci

      - name: Lint frontend and backend
        working-directory: source app folder/dashboard
        run: npm run lint

      - name: Run utility, HTTP race, lifecycle, and metric tests
        working-directory: source app folder/dashboard
        run: npm run test:server

      - name: Build dashboard
        working-directory: source app folder/dashboard
        run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: source app folder/tracker/requirements.txt

      - name: Install tracker dependencies
        run: python -m pip install -r 'source app folder/tracker/requirements.txt'

      - name: Check Python syntax
        run: python -m py_compile 'source app folder/tracker/tracker.py'

      - name: Run tracker scientific regression tests
        run: python -m unittest discover -s 'source app folder/tracker/tests' -p 'test_*.py' -v

  validate-windows-node:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source app folder/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: source app folder/dashboard
        run: npm ci

      - name: Lint frontend and backend
        working-directory: source app folder/dashboard
        run: npm run lint

      - name: Run Node utility, HTTP, lifecycle, and metric tests
        working-directory: source app folder/dashboard
        run: npm run test:server

      - name: Build dashboard
        working-directory: source app folder/dashboard
        run: npm run build
