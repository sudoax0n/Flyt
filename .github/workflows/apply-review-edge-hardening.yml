name: Apply review edge hardening

on:
  push:
    branches:
      - fix/critical-job-races
    paths:
      - '.github/scripts/review-edge-hardening.part*'
      - '.github/workflows/apply-review-edge-hardening.yml'

permissions:
  contents: write

concurrency:
  group: flyt-review-edge-hardening
  cancel-in-progress: false

jobs:
  patch-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/critical-job-races
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source app folder/dashboard/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: source app folder/tracker/requirements.txt

      - name: Reconstruct and apply transparent patch
        run: |
          cat .github/scripts/review-edge-hardening.part* > /tmp/review-edge-hardening.py
          python -m py_compile /tmp/review-edge-hardening.py
          python /tmp/review-edge-hardening.py
          git diff --check

      - name: Install dashboard dependencies
        working-directory: source app folder/dashboard
        run: npm ci

      - name: Lint backend and regression tests
        working-directory: source app folder/dashboard
        run: npm run lint:backend

      - name: Run utility, HTTP, lifecycle, and metric tests
        working-directory: source app folder/dashboard
        run: npm run test:server

      - name: Build dashboard
        working-directory: source app folder/dashboard
        run: npm run build

      - name: Install tracker dependencies
        run: python -m pip install -r 'source app folder/tracker/requirements.txt'

      - name: Check tracker syntax
        run: python -m py_compile 'source app folder/tracker/tracker.py'

      - name: Run tracker regression tests
        run: python -m unittest discover -s 'source app folder/tracker/tests' -p 'test_*.py' -v

      - name: Commit validated hardening
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            'source app folder/dashboard/server-utils.js' \
            'source app folder/dashboard/server.js' \
            'source app folder/dashboard/src/App.jsx' \
            'source app folder/dashboard/src/metrics.js' \
            'source app folder/dashboard/tests/metrics.test.js' \
            'source app folder/dashboard/tests/server-integration.test.js' \
            'source app folder/dashboard/tests/server-utils.test.js' \
            'source app folder/tracker/tracker.py' \
            'source app folder/tracker/tests/test_tracker.py'
          git commit -m 'fix: close fail-closed termination and rollback edges'
          git fetch origin fix/critical-job-races
          git rebase origin/fix/critical-job-races
          git push origin HEAD:fix/critical-job-races
