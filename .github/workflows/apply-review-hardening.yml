name: Apply review hardening

on:
  push:
    branches:
      - fix/critical-job-races
    paths:
      - '.github/scripts/apply-review-hardening.py'
      - '.github/workflows/apply-review-hardening.yml'
  pull_request:
    paths:
      - '.github/scripts/apply-review-hardening.py'
      - '.github/workflows/apply-review-hardening.yml'
      - 'source app folder/dashboard/src/App.jsx'
      - 'source app folder/dashboard/tests/frontend-contract.test.js'

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/critical-job-races
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source app folder/dashboard/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: source app folder/tracker/requirements.txt

      - name: Apply exact review patch
        run: python .github/scripts/apply-review-hardening.py

      - name: Validate and capture exact diagnostics
        run: |
          set +e
          diagnostics='.github/validation-diagnostics.txt'
          : > "$diagnostics"
          overall=0

          run_check() {
            label="$1"
            seconds="$2"
            shift 2
            echo "===== $label =====" | tee -a "$diagnostics"
            timeout --signal=TERM --kill-after=10s "${seconds}s" "$@" >> "$diagnostics" 2>&1
            status=$?
            cat "$diagnostics"
            if [ "$status" -ne 0 ]; then
              overall="$status"
            fi
            echo >> "$diagnostics"
          }

          run_check 'npm ci' 180 bash -lc "cd 'source app folder/dashboard' && npm ci"
          run_check 'backend lint' 60 bash -lc "cd 'source app folder/dashboard' && npm run lint:backend"
          run_check 'Node HTTP and utility tests' 120 bash -lc "cd 'source app folder/dashboard' && npm run test:server"
          run_check 'dashboard build' 120 bash -lc "cd 'source app folder/dashboard' && npm run build"
          run_check 'tracker dependency install' 180 python -m pip install -r 'source app folder/tracker/requirements.txt'
          run_check 'tracker syntax' 30 python -m py_compile 'source app folder/tracker/tracker.py'
          run_check 'tracker regression tests' 60 python -m unittest discover -s 'source app folder/tracker/tests' -p 'test_*.py' -v

          if [ "$overall" -ne 0 ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add "$diagnostics"
            git commit -m 'chore: capture review validation diagnostics'
            git push origin HEAD:fix/critical-job-races
            exit "$overall"
          fi

          rm -f "$diagnostics" '.github/eslint-diagnostics.json'

      - name: Commit validated UI integration
        run: |
          if git diff --quiet -- 'source app folder/dashboard/src/App.jsx'; then
            echo 'Expected App.jsx review patch was not produced.' >&2
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'source app folder/dashboard/src/App.jsx'
          git commit -m 'fix: preserve historic verified review counts'
          git push origin HEAD:fix/critical-job-races
