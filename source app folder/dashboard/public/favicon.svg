<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Flyt logo</title>
  <desc id="desc">A luminous stylized fruit fly with data trajectory nodes on a dark rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="55" x2="440" y2="465" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151B31"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <linearGradient id="body" x1="210" y1="125" x2="300" y2="435" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B89CFF"/>
      <stop offset=".48" stop-color="#875BFF"/>
      <stop offset="1" stop-color="#5B35D5"/>
    </linearGradient>
    <linearGradient id="wingL" x1="94" y1="168" x2="235" y2="309" gradientUnits="userSpaceOnUse">
      <stop stop-color="#75E7FF" stop-opacity=".92"/>
      <stop offset="1" stop-color="#3A8BFF" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="wingR" x1="418" y1="168" x2="277" y2="309" gradientUnits="userSpaceOnUse">
      <stop stop-color="#75E7FF" stop-opacity=".92"/>
      <stop offset="1" stop-color="#3A8BFF" stop-opacity=".18"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="128" fill="url(#bg)"/>
  <rect x="17" y="17" width="478" height="478" rx="127" fill="none" stroke="#7D6AFF" stroke-opacity=".28" stroke-width="2"/>

  <path d="M117 361C75 306 82 219 136 155" fill="none" stroke="#46D7FF" stroke-opacity=".45" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 22"/>
  <circle cx="116" cy="361" r="12" fill="#46D7FF" filter="url(#glow)"/>
  <circle cx="136" cy="155" r="9" fill="#9C7CFF" filter="url(#glow)"/>

  <path d="M225 225C172 154 104 160 92 228C82 289 137 337 221 286Z" fill="url(#wingL)" stroke="#79DFFF" stroke-opacity=".75" stroke-width="5"/>
  <path d="M287 225C340 154 408 160 420 228C430 289 375 337 291 286Z" fill="url(#wingR)" stroke="#79DFFF" stroke-opacity=".75" stroke-width="5"/>
  <path d="M214 244C168 218 131 217 107 240" fill="none" stroke="#D5F8FF" stroke-opacity=".35" stroke-width="4"/>
  <path d="M298 244C344 218 381 217 405 240" fill="none" stroke="#D5F8FF" stroke-opacity=".35" stroke-width="4"/>

  <path d="M229 155L207 112" stroke="#A58CFF" stroke-width="9" stroke-linecap="round"/>
  <path d="M283 155L305 112" stroke="#A58CFF" stroke-width="9" stroke-linecap="round"/>
  <circle cx="204" cy="106" r="9" fill="#62DFFF"/>
  <circle cx="308" cy="106" r="9" fill="#62DFFF"/>

  <circle cx="256" cy="173" r="49" fill="url(#body)" stroke="#D2C4FF" stroke-opacity=".55" stroke-width="5"/>
  <rect x="216" y="207" width="80" height="106" rx="38" fill="url(#body)"/>
  <path d="M256 293C210 293 205 348 222 407C230 437 245 452 256 452C267 452 282 437 290 407C307 348 302 293 256 293Z" fill="url(#body)"/>
  <path d="M224 350H288M222 389H290M233 426H279" stroke="#D7CCFF" stroke-opacity=".35" stroke-width="8" stroke-linecap="round"/>

  <path d="M220 279L165 333M292 279L347 333M222 305L178 384M290 305L334 384" stroke="#8966FF" stroke-width="9" stroke-linecap="round"/>
  <circle cx="256" cy="173" r="18" fill="#0B1020" opacity=".9"/>
