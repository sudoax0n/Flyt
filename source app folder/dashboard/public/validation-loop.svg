<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Flyt human verification workflow</title>
  <desc id="desc">Candidate detections remain linked to video while researcher verdicts are stored separately from raw tracking output.</desc>
  <rect x="1" y="1" width="1198" height="418" rx="18" fill="#FBFBFA" stroke="#E8E7E3" stroke-width="2"/>
  <text x="48" y="49" fill="#252523" font-family="Georgia,Times New Roman,serif" font-size="27">Detection and verification stay separate</text>
  <text x="48" y="78" fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="14">Candidates point to evidence. Researcher decisions do not rewrite raw tracker output.</text>
  <g transform="translate(48 112)" font-family="Helvetica Neue,Arial,sans-serif">
    <rect width="300" height="258" rx="9" fill="#FFFFFF" stroke="#E8E7E3"/>
    <text x="22" y="34" fill="#74736E" font-size="10" font-weight="700" letter-spacing="1">DETECTED CANDIDATES</text>
    <g transform="translate(18 53)">
      <rect width="264" height="53" rx="6" fill="#E8F2F8"/><circle cx="23" cy="26" r="6" fill="#246486"/>
      <text x="40" y="23" fill="#246486" font-size="12" font-weight="600">Low-confidence segment</text><text x="40" y="40" fill="#496B7B" font-size="10">00:12.8  /  31 frames</text>
    </g>
    <g transform="translate(18 116)">
      <path d="M0 0H264M0 57H264M0 114H264" stroke="#E8E7E3"/>
      <text x="4" y="24" fill="#252523" font-size="12" font-weight="600">Identity uncertainty</text><text x="204" y="24" fill="#74736E" font-family="Consolas,monospace" font-size="9">00:38.2</text><text x="4" y="43" fill="#A3A19B" font-size="10">48 frames  /  inspect identity</text>
      <text x="4" y="81" fill="#252523" font-size="12" font-weight="600">Detection loss</text><text x="204" y="81" fill="#74736E" font-family="Consolas,monospace" font-size="9">01:31.4</text><text x="4" y="100" fill="#A3A19B" font-size="10">36 frames  /  zero contours</text>
    </g>
  </g>
  <path d="M366 241H405" stroke="#A3A19B" stroke-width="2"/><path d="M398 234L407 241L398 248" fill="none" stroke="#A3A19B" stroke-width="2"/>
  <g transform="translate(424 112)">
    <rect width="366" height="258" rx="9" fill="#FFFFFF" stroke="#E8E7E3"/>
    <text x="22" y="34" fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1">LINKED OBSERVATION</text>
    <rect x="22" y="52" width="322" height="156" rx="6" fill="#252523"/>
    <rect x="45" y="70" width="276" height="119" rx="4" fill="#343733" stroke="#5C6059"/>
    <path d="M63 166C101 133 126 156 157 112C184 74 219 132 252 91C274 63 298 80 310 72" fill="none" stroke="#B9D7E7" stroke-width="3"/>
    <path d="M65 86C105 96 116 127 159 143C205 159 252 172 309 165" fill="none" stroke="#C9D8C7" stroke-width="3"/>
    <circle cx="157" cy="112" r="7" fill="#E8F2F8" stroke="#246486" stroke-width="2"/><circle cx="159" cy="143" r="7" fill="#EDF3EC" stroke="#346538" stroke-width="2"/>
    <rect x="22" y="222" width="322" height="6" rx="3" fill="#E8E7E3"/><rect x="22" y="222" width="190" height="6" rx="3" fill="#74736E"/><circle cx="212" cy="225" r="7" fill="#252523"/>
    <text x="22" y="247" fill="#74736E" font-family="Helvetica Neue,Arial,sans-serif" font-size="10">Video seeks to the candidate timestamp.</text>
  </g>
  <path d="M808 241H847" stroke="#A3A19B" stroke-width="2"/><path d="M840 234L849 241L840 248" fill="none" stroke="#A3A19B" stroke-width="2"/>
  <g transform="translate(866 112)" font-family="Helvetica Neue,Arial,sans-serif">
    <rect width="286" height="258" rx="9" fill="#FFFFFF" stroke="#E8E7E3"/>
    <text x="22" y="34" fill="#74736E" font-size="10" font-weight="700" letter-spacing="1">RESEARCHER VERDICT</text>
    <rect x="22" y="55" width="116" height="40" rx="5" fill="#EDF3EC" stroke="#CADFC9"/><path d="M39 75L47 83L61 67" fill="none" stroke="#346538" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="70" y="80" fill="#346538" font-size="11" font-weight="600">Confirm</text>
    <rect x="148" y="55" width="116" height="40" rx="5" fill="#FBEAEC" stroke="#ECCFD2"/><path d="M167 68L181 82M181 68L167 82" stroke="#983A3A" stroke-width="3" stroke-linecap="round"/><text x="193" y="80" fill="#983A3A" font-size="11" font-weight="600">Reject</text>
    <rect x="22" y="117" width="242" height="111" rx="7" fill="#EDF3EC"/>
    <text x="40" y="143" fill="#346538" font-size="10" font-weight="700">SAVED SEPARATELY</text>
    <text x="40" y="176" fill="#252523" font-family="Georgia,Times New Roman,serif" font-size="21">Review record</text>
    <text x="40" y="199" fill="#5F765F" font-size="10">Run-scoped verification JSON</text>
    <text x="40" y="215" fill="#5F765F" font-size="10">Raw CSV remains unchanged</text>
  </g>
</svg>